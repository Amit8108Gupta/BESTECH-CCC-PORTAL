<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BESTECH Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="topbar">

<h2>BESTECH ADMIN DASHBOARD</h2>

<button id="logoutBtn">Logout</button>

</header>

<div class="cards">

<div class="card">
<h3>Total Students</h3>
<h1 id="totalStudents">0</h1>
</div>

<div class="card">
<h3>Total Tests</h3>
<h1 id="totalTests">0</h1>
</div>

<div class="card">
<h3>Pass %</h3>
<h1 id="passPercentage">0%</h1>
</div>

<div class="card">
<h3>Highest Score</h3>
<h1 id="highestScore">0</h1>
</div>

</div>

<div class="menu">

<button id="studentsBtn">Students</button>

<button id="resultsBtn">Results</button>

<button id="questionsBtn">Questions</button>

<button id="settingsBtn">Settings</button>

</div>

<div id="content">

<h2>Welcome Admin</h2>

<p>Select any option above.</p>

</div>

<script src="js/dashboard.js"></script>

</body>
</html>
