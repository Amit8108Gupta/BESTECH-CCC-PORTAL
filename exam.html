<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BESTECH CCC Online Exam</title>

<link rel="stylesheet" href="css/exam.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="header">

<div class="logo-section">

<img src="images/logo.png" class="logo">

<div>

<h2>BESTECH COMPUTER EDUCATION</h2>

<p>& LEARNING LIBRARY</p>

</div>

</div>

<div class="timer-box">

⏰ Time Left

<h2 id="timer">90:00</h2>

</div>

</header>

<div class="student-info">

<span id="studentName"></span>

<span id="studentMobile"></span>

<span id="testCode"></span>

</div>

<div class="progress">

<div id="progressBar"></div>

</div>

<div class="exam-container">

<div class="question-panel">

<h3 id="questionNumber">
Question 1 of 100
</h3>

<h2 id="questionText">

Loading Question...

</h2>

<div id="options">

<label><input type="radio" name="answer" value="A"> <span id="optA"></span></label>

<label><input type="radio" name="answer" value="B"> <span id="optB"></span></label>

<label><input type="radio" name="answer" value="C"> <span id="optC"></span></label>

<label><input type="radio" name="answer" value="D"> <span id="optD"></span></label>

</div>

<div class="buttons">

<button id="prevBtn">

Previous

</button>

<button id="nextBtn">

Next

</button>

<button id="submitBtn">

Submit Test

</button>

</div>

</div>

<div id="palette" class="palette">

</div>

</div>

<!--<script src="js/timer.js"></script>-->


</body>

</html>
